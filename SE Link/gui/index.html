<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple&amp;Eco Link</title>
  <style>
    /* ── Tokens idênticos ao admin panel (dark) ─────────────────────── */
    :root {
      --page:       #0e0e0e;
      --card:       #111111;
      --border:     rgba(255,255,255,0.10);
      --subtle:     rgba(255,255,255,0.05);
      --hover:      rgba(255,255,255,0.05);
      --txt1:       #ffffff;
      --txt2:       #d4d4d8;
      --txt3:       #a1a1aa;
      --txt4:       #71717a;
      --orange:     #FF8C00;
      --pink:       #D81B60;
      --green:      #22c55e;
      --red:        #ef4444;
      --amber:      #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--page);
      color: var(--txt1);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Topbar ─────────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-brand h1 {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.01em;
    }
    .topbar-brand h1 .accent {
      background: linear-gradient(to right, var(--orange), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .version-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--txt4);
      background: var(--subtle);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 7px;
    }
    .topbar-sub {
      font-size: 0.75rem;
      color: var(--txt4);
    }

    /* ── Grad bar ───────────────────────────────────────────────────── */
    .grad-bar {
      height: 2px;
      background: linear-gradient(to right, var(--orange), var(--pink));
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      transition: background .4s;
    }
    .grad-bar.loading {
      background: rgba(255,255,255,0.07);
    }
    .grad-bar.loading::after {
      content: '';
      position: absolute;
      top: 0;
      left: -45%;
      width: 45%;
      height: 100%;
      background: linear-gradient(to right,
        transparent,
        rgba(255,255,255,0.55),
        transparent
      );
      animation: bar-sweep 1.1s ease-in-out infinite;
    }
    @keyframes bar-sweep {
      0%   { left: -45%; }
      100% { left: 110%; }
    }

    /* ── Main content ───────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px 24px;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Card ───────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--txt4);
      text-transform: uppercase;
    }
    .card-body {
      padding: 14px 16px;
    }

    /* ── Pasta DBF ──────────────────────────────────────────────────── */
    .folder-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .folder-path {
      flex: 1;
      background: var(--subtle);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: 'Consolas', 'Cascadia Code', monospace;
      font-size: 0.78rem;
      color: var(--txt3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-ghost {
      padding: 8px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--txt3);
      background: var(--subtle);
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
      flex-shrink: 0;
    }
    .btn-ghost:hover { background: var(--hover); color: var(--txt1); border-color: rgba(255,255,255,0.18); }

    /* ── Status ─────────────────────────────────────────────────────── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dot-wrap {
      position: relative;
      width: 10px;
      height: 10px;
      flex-shrink: 0;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--txt4);
      position: absolute;
      top: 0; left: 0;
      transition: background .3s;
    }
    .dot-ring {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
    }
    .status-text {
      flex: 1;
      font-size: 0.85rem;
      color: var(--txt4);
      transition: color .3s;
    }
    .status-text.active { color: var(--txt2); }

    .btn-primary {
      padding: 7px 16px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #000;
      background: #ffffff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-primary:hover:not(:disabled) { background: #e5e5e5; }
    .btn-primary:disabled {
      background: var(--subtle);
      color: var(--txt4);
      cursor: default;
      border: 1px solid var(--border);
    }
    .btn-danger {
      padding: 7px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--txt4);
      background: var(--subtle);
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: default;
      letter-spacing: 0.02em;
      transition: background .15s, color .15s, border-color .15s;
      white-space: nowrap;
    }
    .btn-danger.active {
      color: #fca5a5;
      background: rgba(239,68,68,.10);
      border-color: rgba(239,68,68,.22);
      cursor: pointer;
    }
    .btn-danger.active:hover { background: rgba(239,68,68,.18); }

    /* ── Sync badge ─────────────────────────────────────────────────── */
    .sync-badge {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      width: fit-content;
      background: var(--subtle);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px 4px 8px;
    }
    .sync-badge.visible { display: flex; }
    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .sync-badge-label {
      font-size: 0.65rem;
      color: var(--txt4);
      font-weight: 500;
    }
    .sync-badge-value {
      font-size: 0.65rem;
      color: var(--txt3);
      font-weight: 600;
      font-family: 'Consolas', monospace;
    }

    /* ── Log ────────────────────────────────────────────────────────── */
    .card-log {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .btn-copy {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--txt4);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 8px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .btn-copy:hover { color: var(--txt1); border-color: rgba(255,255,255,.22); }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      font-family: 'Consolas', 'Cascadia Code', monospace;
      font-size: 0.75rem;
      line-height: 1.7;
      color: #d1d5db;
      background: #0a0a0a;
    }
    #log::-webkit-scrollbar        { width: 5px; }
    #log::-webkit-scrollbar-track  { background: transparent; }
    #log::-webkit-scrollbar-thumb  { background: rgba(255,255,255,.10); border-radius: 3px; }
    #log::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }

    .log-info    { color: #86efac; }
    .log-error   { color: #fca5a5; }
    .log-warning { color: #fde68a; }

    /* ── Dot animations ─────────────────────────────────────────────── */
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: .5; }
      100% { transform: scale(2.2); opacity: 0;  }
    }
    .dot-ring.pulsing {
      animation: pulse-ring 1s ease-out infinite;
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <h1>Simple&amp;Eco <span class="accent">Link</span></h1>
      <span class="version-badge">v2.0</span>
    </div>
    <span class="topbar-sub">Sincronizador DBF → Supabase</span>
  </div>

  <!-- Gradient bar -->
  <div class="grad-bar"></div>

  <!-- Main -->
  <div class="main">

    <!-- Card: Pasta DBF -->
    <div class="card">
      <div class="card-header">
        <span class="card-label">Pasta dos DBFs</span>
      </div>
      <div class="card-body">
        <div class="folder-row">
          <div class="folder-path" id="folderPath">Carregando...</div>
          <button class="btn-ghost" onclick="alterarPasta()">Alterar pasta</button>
        </div>
      </div>
    </div>

    <!-- Card: Status -->
    <div class="card">
      <div class="card-header">
        <span class="card-label">Status</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="btn-primary" id="btnIniciar" onclick="iniciar()">Iniciar</button>
          <button class="btn-danger"  id="btnParar"   onclick="parar()">Parar</button>
        </div>
      </div>
      <div class="card-body">
        <div class="status-row">
          <div class="dot-wrap">
            <div class="dot-ring" id="dotRing"></div>
            <div class="dot" id="dot"></div>
          </div>
          <span class="status-text" id="statusText">Aguardando inicialização...</span>
        </div>
        <div class="sync-badge" id="syncTime">
          <div class="sync-dot"></div>
          <span class="sync-badge-label">Última sync:</span>
          <span class="sync-badge-value" id="syncTimeValue">—</span>
        </div>
      </div>
    </div>

    <!-- Card: Log -->
    <div class="card-log">
      <div class="log-header">
        <span class="card-label">Console</span>
        <button class="btn-copy" id="btnCopyLog" onclick="copyLog()">Copiar</button>
      </div>
      <div id="log"></div>
    </div>

  </div><!-- /main -->

  <script>
    let _blinkTimer = null;

    function _clearBlink() {
      if (_blinkTimer) { clearInterval(_blinkTimer); _blinkTimer = null; }
    }

    function copyLog() {
      const lines = document.querySelectorAll('#log div');
      const text  = Array.from(lines).map(l => l.textContent).join('\n');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('btnCopyLog');
        btn.textContent = 'Copiado!';
        setTimeout(() => { btn.textContent = 'Copiar'; }, 2000);
      });
    }

    window.setState = function(state) {
      _clearBlink();
      const dot  = document.getElementById('dot');
      const ring = document.getElementById('dotRing');
      const bar  = document.querySelector('.grad-bar');
      ring.classList.remove('pulsing');
      ring.style.background = 'transparent';

      // Barra: cinza+sweep enquanto carrega, gradiente nos demais estados
      if (state === 'syncing' || state === 'synced') {
        bar.classList.add('loading');
      } else {
        bar.classList.remove('loading');
      }

      if (state === 'syncing') {
        dot.style.background  = 'var(--orange)';
        ring.style.background = 'var(--orange)';
        ring.classList.add('pulsing');

      } else if (state === 'synced') {
        dot.style.background  = 'var(--green)';
        ring.style.background = 'var(--green)';
        ring.classList.add('pulsing');

      } else if (state === 'monitoring') {
        let on = true;
        dot.style.background = '#ffffff';
        _blinkTimer = setInterval(() => {
          on = !on;
          dot.style.background = on ? '#ffffff' : 'rgba(255,255,255,0.12)';
        }, 900);

      } else if (state === 'error') {
        dot.style.background  = 'var(--red)';
        ring.style.background = 'var(--red)';
        ring.classList.add('pulsing');

      } else {
        dot.style.background = 'var(--txt4)';
      }
    };

    window.setSyncTime = function(ts) {
      const badge = document.getElementById('syncTime');
      const val   = document.getElementById('syncTimeValue');
      if (ts) { val.textContent = ts; badge.classList.add('visible'); }
      else    { badge.classList.remove('visible'); }
    };

    window.setStatus = function({ text, running }) {
      const st  = document.getElementById('statusText');
      const btn = document.getElementById('btnIniciar');
      const par = document.getElementById('btnParar');

      st.textContent = text;
      st.className   = 'status-text' + (running ? ' active' : '');

      if (running) {
        btn.disabled = true;
        par.classList.add('active');
      } else {
        btn.disabled = false;
        par.classList.remove('active');
        _clearBlink();
        document.getElementById('dot').style.background  = 'var(--txt4)';
        document.getElementById('dotRing').classList.remove('pulsing');
        document.querySelector('.grad-bar').classList.remove('loading');
      }
    };

    window.appendLog = function({ level, msg }) {
      const box  = document.getElementById('log');
      const line = document.createElement('div');
      const lvl  = (level || '').toUpperCase();
      if      (lvl === 'INFO')    line.className = 'log-info';
      else if (lvl === 'ERROR')   line.className = 'log-error';
      else if (lvl === 'WARNING') line.className = 'log-warning';
      line.textContent = msg;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    };

    async function alterarPasta() {
      const result = await window.pywebview.api.escolher_pasta();
      if (result) document.getElementById('folderPath').textContent = result;
    }

    function iniciar() { window.pywebview.api.iniciar(); }

    function parar() {
      const par = document.getElementById('btnParar');
      if (!par.classList.contains('active')) return;
      window.pywebview.api.parar();
    }

    window.addEventListener('pywebviewready', async () => {
      const dir = await window.pywebview.api.get_dbf_dir();
      document.getElementById('folderPath').textContent = dir;
      const ts = await window.pywebview.api.get_last_sync();
      if (ts) window.setSyncTime(ts);
    });
  </script>
</body>
</html>
