<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Simple&amp;Eco - Produção</title>
    <script>
      var isDark = localStorage.getItem('se_theme') !== 'light';
      if (isDark) {
        document.documentElement.classList.add('dark');
        document.documentElement.style.background = '#0e0e0e';
        document.body && (document.body.style.background = '#0e0e0e');
      } else {
        document.documentElement.style.background = '#f3f4f6';
        document.body && (document.body.style.background = '#f3f4f6');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
